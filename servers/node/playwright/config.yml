name: mcp-playwright
type: node
version: 1.0.0
description: "MCP server for browser automation and web scraping with Playwright"
base_image: ../base/Dockerfile.node
entry_command: "npx @microsoft/mcp-playwright"
author: "Microsoft"
repository: "https://github.com/microsoft/playwright-mcp"

environment:
  - name: MCP_PORT
    description: "Port for the MCP server to listen on"
    default: "3000"
    required: false
    secret: false
  - name: HEADLESS
    description: "Run browser in headless mode"
    default: "true"
    required: false
    secret: false
  - name: BROWSER_TYPE
    description: "Browser to use (chromium, firefox, webkit)"
    default: "chromium"
    required: false
    secret: false
  - name: TIMEOUT
    description: "Default timeout for operations in milliseconds"
    default: "30000"
    required: false
    secret: false
    
resources:
  cpu: 0.5
  memory: 512

security:
  # Block SSRF to internal networks, cloud metadata, and cluster services.
  # Enforced at two layers:
  #   1. Application: --blocked-origins flag on @playwright/mcp
  #   2. Network: Kubernetes NetworkPolicy egress rules (network-policy.yml)
  blockedNetworks:
    - "10.0.0.0/8"        # RFC-1918
    - "172.16.0.0/12"     # RFC-1918
    - "192.168.0.0/16"    # RFC-1918
    - "169.254.0.0/16"    # Link-local (AWS IMDS, Azure IMDS)
    - "100.64.0.0/10"     # CGNAT / EKS pod CIDR
    - "fd00::/8"          # IPv6 ULA
    - "fe80::/10"         # IPv6 link-local
  blockedDomains:
    - "*.svc"
    - "*.svc.cluster.local"
    - "*.internal"
    - "metadata.google.internal"
  networkPolicy:
    enabled: true

capabilities:
  - "browser/navigate"
  - "browser/screenshot"
  - "browser/evaluate"
  - "browser/click"
  - "browser/type"
  - "browser/wait"